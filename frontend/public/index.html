<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon-32.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4361ee" />
    <meta
      name="description"
      content="Expense Tracker (වියදම් පොත / செலவு கணக்கு) — track spending, charts, and monthly reports in English, Sinhala, or Tamil."
    />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Expense Tracker</title>

    <!-- Link / social preview (Open Graph + Twitter) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Expense Tracker" />
    <meta property="og:title" content="Expense Tracker · වියදම් පොත · செலவு கணக்கு" />
    <meta
      property="og:description"
      content="Free personal expense tracker — dashboard, categories, monthly reports. English, Sinhala, and Tamil."
    />
    <meta property="og:image" content="https://expense-tracker-liard-nine.vercel.app/og-image.png" />
    <meta property="og:image:alt" content="Expense Tracker — mobile finance charts illustration" />
    <meta property="og:url" content="https://expense-tracker-liard-nine.vercel.app/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Expense Tracker · වියදම් පොත · செலவு கணக்கு" />
    <meta
      name="twitter:description"
      content="Free personal expense tracker — dashboard, categories, monthly reports. English, Sinhala, and Tamil."
    />
    <meta name="twitter:image" content="https://expense-tracker-liard-nine.vercel.app/og-image.png" />
    <!-- Apply saved theme before paint (default light) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('expense-tracker-theme');
          if (t === 'dark' || t === 'light') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
